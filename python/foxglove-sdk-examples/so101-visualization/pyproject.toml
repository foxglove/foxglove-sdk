[project]
name = "so101-visualization"
version = "0.1.0"
description = "SO-101 robot arm visualization with Foxglove"
authors = [{ name = "Foxglove", email = "contact@foxglove.dev" }]
requires-python = ">=3.12"
dependencies = [
    "foxglove-sdk>=0.25.1,<0.26.0",
    "scipy~=1.0",
    "yourdfpy",
    # LeRobot's native Foxglove support (used by dataset_playback.py) is not yet in a
    # PyPI release; switch to "lerobot[feetech,dataset_viz]>=0.5.2" once it ships.
    "lerobot[feetech,dataset_viz] @ git+https://github.com/huggingface/lerobot.git",
]

[dependency-groups]
dev = ["mypy>=1,<2"]

[tool.uv]
package = false
