name: Checkout foxglove-sdk
description: Checks out foxglove-sdk at the action's pinned ref

inputs:
  path:
    description: Where to check out the repository
    default: .foxglove-sdk

runs:
  using: composite
  steps:
    - name: Resolve ref
      id: resolve
      shell: bash
      run: |
        echo "repository=${{ github.action_repository }}" >> "$GITHUB_OUTPUT"
        echo "ref=${{ github.action_ref }}" >> "$GITHUB_OUTPUT"

    - uses: actions/checkout@v6
      with:
        repository: ${{ steps.resolve.outputs.repository }}
        ref: ${{ steps.resolve.outputs.ref }}
        path: ${{ inputs.path }}
