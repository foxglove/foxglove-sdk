name: Install common dependencies

inputs:
  python-version:
    description: Python version to install
    required: false
    default: "3.10"

runs:
  using: composite
  steps:
    - uses: actions/setup-python@v6
      with:
        python-version: ${{ inputs.python-version }}

    - uses: astral-sh/setup-uv@v6

    # disable man-db to speed up apt install
    - shell: bash
      run: sudo rm -f /var/lib/man-db/auto-update

    - name: Install apt packages (with retry)
      shell: bash
      run: |
        for attempt in 1 2 3; do
          if sudo apt-get update && sudo apt-get install -y --no-install-recommends \
            libprotobuf-dev \
            protobuf-compiler \
            libglib2.0-dev \
            libva-dev; then
            exit 0
          fi
          if [ "$attempt" -eq 3 ]; then
            echo "::error::apt-get failed after 3 attempts"
            exit 1
          fi
          echo "::warning::apt-get failed (attempt $attempt/3); retrying in 15s"
          sleep 15
        done
