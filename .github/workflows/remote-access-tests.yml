name: Remote Access Tests

on:
  push:
    branches: [main]
  pull_request: {}

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v6
        with:
          lfs: true

      - name: Install common dependencies
        uses: ./.github/actions/common-deps

      - uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          toolchain: stable

      - name: Start LiveKit server
        run: docker compose up -d --wait

      - name: Run LiveKit integration tests
        run: cargo test -p remote_access_tests -- --ignored livekit_

      - name: Run auth integration tests
        if: ${{ !github.event.pull_request.head.repo.fork && github.actor != 'dependabot[bot]' }}
        run: cargo test -p remote_access_tests -- --ignored auth_
        env:
          FOXGLOVE_API_KEY: ${{ secrets.REMOTE_ACCESS_TESTS_API_KEY }}

      - name: Stop LiveKit server
        if: always()
        run: docker compose down

  netem-test:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v6
        with:
          lfs: true

      - name: Install common dependencies
        uses: ./.github/actions/common-deps

      - uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          toolchain: stable

      - name: Start LiveKit with netem
        run: docker compose -f docker-compose.yaml -f docker-compose.netem.yml up -d --wait

      - name: Run netem integration tests
        run: cargo test -p remote_access_tests -- --ignored netem_

      - name: Stop LiveKit with netem
        if: always()
        run: docker compose -f docker-compose.yaml -f docker-compose.netem.yml down

  netem-perlink-docker-test:
    runs-on: ubuntu-latest
    # Two-container per-link tests: build inside Docker + coordination timeouts.
    timeout-minutes: 20
    env:
      NETEM_LINK_GATEWAY_DST: "10.99.0.31"
      NETEM_LINK_VIEWER_DST: "10.99.0.40"
      NETEM_GATEWAY_UPLOAD: "delay 200ms 50ms loss 5%"
      NETEM_GATEWAY_DOWNLOAD: "delay 200ms 50ms loss 5%"
      NETEM_VIEWER_UPLOAD: "delay 10ms 2ms"
      NETEM_VIEWER_DOWNLOAD: "delay 10ms 2ms"
    steps:
      - uses: actions/checkout@v6
        with:
          lfs: true

      - name: Generate room name for perlink tests
        run: echo "PERLINK_ROOM_NAME=test-room-$(uuidgen)" >> "$GITHUB_ENV"

      - name: Start per-link netem stack with perlink profile
        run: >
          docker compose
          -f docker-compose.yaml
          -f docker-compose.netem.yml
          -f docker-compose.netem-livekit.yml
          --profile perlink
          up -d --wait

      - name: Clean coordination directory
        run: >
          docker compose
          -f docker-compose.yaml
          -f docker-compose.netem.yml
          -f docker-compose.netem-livekit.yml
          exec gateway-runner sh -c 'rm -f /coordination/*'

      - name: Build test binary in gateway-runner
        run: >
          docker compose
          -f docker-compose.yaml
          -f docker-compose.netem.yml
          -f docker-compose.netem-livekit.yml
          exec gateway-runner
          cargo test -p remote_access_tests --no-run

      - name: Run per-link docker tests (gateway + viewer)
        run: |
          COMPOSE="docker compose \
            -f docker-compose.yaml \
            -f docker-compose.netem.yml \
            -f docker-compose.netem-livekit.yml"
          $COMPOSE exec -T gateway-runner \
            cargo test -p remote_access_tests -- --ignored perlink_docker_gateway --nocapture &
          gateway_pid=$!
          $COMPOSE exec -T viewer-runner \
            cargo test -p remote_access_tests -- --ignored perlink_docker_viewer --nocapture &
          viewer_pid=$!
          gateway_rc=0; wait "$gateway_pid" || gateway_rc=$?
          viewer_rc=0; wait "$viewer_pid" || viewer_rc=$?
          if [ "$gateway_rc" -ne 0 ] || [ "$viewer_rc" -ne 0 ]; then
            echo "Per-link docker test FAILED (gateway=$gateway_rc, viewer=$viewer_rc)." >&2
            exit 1
          fi

      - name: Stop per-link netem stack
        if: always()
        run: >
          docker compose
          -f docker-compose.yaml
          -f docker-compose.netem.yml
          -f docker-compose.netem-livekit.yml
          --profile perlink
          down
