name: Rust Data Provider Example

on:
  push:
    branches: [main]
    tags: ["**"]
  pull_request: {}
  workflow_call:
    inputs:
      sdk-version:
        required: true
        type: string

jobs:
  build:
    name: Build Rust Data Provider Example
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ github.ref }}

      - uses: actions-rust-lang/setup-rust-toolchain@v1

      - name: Build the example
        run: cargo build --release -p example_data_provider

      - name: Run conformance tests
        env:
          DATA_PROVIDER_CMD: target/release/example_data_provider
          DATA_PROVIDER_URL: "http://127.0.0.1:8080/v1/manifest?flightId=TEST123&startTime=2024-01-01T00:00:00Z&endTime=2024-01-01T00:00:05Z"
          DATA_PROVIDER_EXPECTED_STREAMED_SOURCE_COUNT: "1"
          DATA_PROVIDER_EXPECTED_STATIC_FILE_SOURCE_COUNT: "0"
        run: cargo run -p data_provider_conformance

      - name: Upload binary to artifacts
        uses: actions/upload-artifact@v6
        with:
          name: example_data_provider-${{ inputs.sdk-version || github.ref_name }}
          path: target/release/example_data_provider
          if-no-files-found: error
