# Compose override that adds a WireGuard relay so a browser on the host can
# watch the per-link netem stack's stream with media traversing the impaired
# perlink path. Without the relay, a host browser reaches LiveKit through the
# published ports on the default compose network, which bypasses the perlink
# subnet entirely — ICE silently selects the unimpaired path and netem has no
# effect on what the viewer sees.
#
# Usage:
#   yarn netem-relay        # generates keys/configs, starts this service,
#                           # prints the one sudo command, verifies the tunnel
#   yarn netem-relay down   # tears the relay down
#
# Do not `up` this overlay directly: the relay is useless without the host-side
# WireGuard config that `yarn netem-relay` generates, and the conf bind mount
# below requires the generated file to exist. See the relay runbook in
# rust/remote_access_tests/NETEM.md.
#
# Architecture:
#   - viewer-relay joins the perlink network at 10.99.0.60 and terminates a
#     WireGuard tunnel (wg0, tunnel subnet 10.200.0.0/24 by default) whose UDP
#     listen port is published to the host.
#   - The host config's `AllowedIPs = 10.99.0.0/24` (and ONLY that — the
#     scoping is what keeps every other host route off the tunnel) routes
#     perlink-bound traffic from the host into the tunnel.
#   - The relay masquerades tunnel traffic onto perlink, so LiveKit sees the
#     host as 10.99.0.60 and the netem sidecar can shape the viewer-download
#     link by that destination IP (set NETEM_LINK_VIEWER_DST=10.99.0.60 before
#     bringing up the stack).
#
# Stack ownership: this overlay intentionally declares no `depends_on` and
# `yarn netem-relay` starts it with `--no-deps`. The per-link stack is owned by
# `yarn stream-mcap` / `yarn start-netem --perlink` (see the stack-ownership
# note in scripts/streamMcap.ts); recreating those services from this overlay's
# invocation would re-derive their env from the wrong shell. Compose
# invocations that omit this file will print a benign "found orphan containers"
# warning for viewer-relay — do not pass --remove-orphans, which would kill it.

services:
  viewer-relay:
    image: alpine:3
    cap_add:
      - NET_ADMIN
    sysctls:
      - net.ipv4.ip_forward=1
    ports:
      - "51820:51820/udp"
    networks:
      perlink:
        ipv4_address: 10.99.0.60
    volumes:
      # Generated by `yarn netem-relay` (gitignored — contains private keys).
      - ./.netem-relay/relay.conf:/etc/wireguard/relay.conf:ro
    environment:
      # Tunnel addressing. Defaults avoid 10.98/10.99 (the stack's own
      # subnets) and common LAN ranges; override both together if 10.200.0.0/24
      # collides with your network. `yarn netem-relay` derives the same values
      # for the host-side config.
      NETEM_RELAY_TUNNEL_ADDR: "${NETEM_RELAY_TUNNEL_ADDR:-10.200.0.1/24}"
      NETEM_RELAY_TUNNEL_SUBNET: "${NETEM_RELAY_TUNNEL_SUBNET:-10.200.0.0/24}"
    entrypoint: ["/bin/sh", "-c"]
    command:
      # Kernel WireGuard is available in Docker Desktop's VM, so plain alpine
      # plus wireguard-tools suffices (no userspace fallback, no wg-quick —
      # the interface setup is these few `ip`/`wg` commands). `set -e` makes
      # any setup failure kill the container instead of leaving a half-built
      # tunnel behind a passing `sleep`.
      - |
        set -e
        apk add --no-cache wireguard-tools iproute2 iptables > /dev/null 2>&1
        ip link add dev wg0 type wireguard
        wg setconf wg0 /etc/wireguard/relay.conf
        ip address add "$$NETEM_RELAY_TUNNEL_ADDR" dev wg0
        ip link set up dev wg0
        # Masquerade tunnel-originated traffic onto perlink so replies route
        # back through the relay without perlink peers needing a route to the
        # tunnel subnet.
        iptables -t nat -A POSTROUTING -s "$$NETEM_RELAY_TUNNEL_SUBNET" -o eth0 -j MASQUERADE
        exec sleep infinity
    healthcheck:
      test: ["CMD-SHELL", "wg show wg0"]
      interval: 2s
      timeout: 5s
      retries: 10
      start_period: 15s
    profiles:
      - relay
