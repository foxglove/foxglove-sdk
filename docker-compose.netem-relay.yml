# Compose override adding a WireGuard relay so a host browser can watch the
# per-link netem stack with media traversing the impaired perlink path —
# otherwise ICE picks an unimpaired path on the default network and netem has no
# effect on the viewer. Driven by `yarn netem-relay`; see the relay runbook in
# rust/remote_access_tests/NETEM.md for the architecture and flow. Do not `up`
# directly: it needs the host config and bind-mounted conf that command writes.
#
# viewer-relay has no depends_on and runs with --no-deps because the stack is
# owned by `yarn stream-mcap` / `yarn start-netem --perlink`. Compose
# invocations that omit this file warn about an orphan viewer-relay — do not
# pass --remove-orphans, which would kill it.

services:
  viewer-relay:
    image: alpine:3
    cap_add:
      - NET_ADMIN
    sysctls:
      - net.ipv4.ip_forward=1
    ports:
      - "51820:51820/udp"
    networks:
      perlink:
        ipv4_address: 10.99.0.60
    volumes:
      # Generated by `yarn netem-relay` (gitignored — contains private keys).
      - ./.netem-relay/relay.conf:/etc/wireguard/relay.conf:ro
    environment:
      # Tunnel addressing; `yarn netem-relay` derives matching values for the
      # host config. Override NETEM_RELAY_TUNNEL_SUBNET if 10.200.0.0/24 collides.
      NETEM_RELAY_TUNNEL_ADDR: "${NETEM_RELAY_TUNNEL_ADDR:-10.200.0.1/24}"
      NETEM_RELAY_TUNNEL_SUBNET: "${NETEM_RELAY_TUNNEL_SUBNET:-10.200.0.0/24}"
    entrypoint: ["/bin/sh", "-c"]
    command:
      # Kernel WireGuard (present in Docker Desktop's VM) set up directly with
      # `ip`/`wg` — no wg-quick, no userspace fallback. `set -e` so a setup
      # failure kills the container rather than leaving a half-built tunnel.
      - |
        set -e
        apk add --no-cache wireguard-tools iproute2 iptables > /dev/null
        ip link add dev wg0 type wireguard
        wg setconf wg0 /etc/wireguard/relay.conf
        ip address add "$$NETEM_RELAY_TUNNEL_ADDR" dev wg0
        ip link set up dev wg0
        # Masquerade tunnel traffic onto perlink so replies route back through
        # the relay — perlink peers need no route to the tunnel subnet.
        iptables -t nat -A POSTROUTING -s "$$NETEM_RELAY_TUNNEL_SUBNET" -o eth0 -j MASQUERADE
        exec sleep infinity
    healthcheck:
      test: ["CMD-SHELL", "wg show wg0"]
      interval: 2s
      timeout: 5s
      retries: 10
      start_period: 15s
    profiles:
      - relay
