# Compose override that runs LiveKit integration tests inside a Docker container
# on the perlink network, so tc/netem rules can shape traffic between the test
# runner and LiveKit by destination IP.
#
# Usage:
#   docker compose \
#     -f docker-compose.yaml \
#     -f docker-compose.netem.yml \
#     -f docker-compose.netem-livekit.yml \
#     up -d --wait
#
# Then run tests inside the container:
#   docker compose ... exec test-runner \
#     cargo test -p remote_access_tests -- --ignored livekit_
#
# Or use the management script:
#   scripts/netem-livekit.sh up
#   scripts/netem-livekit.sh test
#
# Architecture:
#   - LiveKit joins the perlink network at 10.99.0.2 with node-ip overridden so
#     WebRTC ICE candidates point to the perlink address (not localhost).
#   - test-runner (10.99.0.30): single-container mode. Mounts workspace source
#     and builds/runs tests, connecting to LiveKit at http://10.99.0.2:7880.
#   - gateway-runner (10.99.0.31) + viewer-runner (10.99.0.40): per-link mode
#     (--profile perlink). Two containers on separate IPs so netem can apply
#     different impairment to the gateway (high) and viewer (low) links.
#     Coordinated via a shared tmpfs volume (/coordination).
#   - The netem sidecar classifies egress from LiveKit by destination IP using
#     HTB + u32 filters, applying configurable impairment per link.
#
# Node IP:
#   LiveKit's --node-ip controls the IP address advertised in WebRTC ICE
#   candidates. The default (127.0.0.1) works for host-connected clients
#   (e.g., Foxglove app in a browser). Override to 10.99.0.2 for container-
#   based tests where the test runner is on the perlink network:
#
#     LIVEKIT_NODE_IP=10.99.0.2 scripts/netem-livekit.sh up

networks:
  perlink:
    driver: bridge
    ipam:
      config:
        - subnet: 10.99.0.0/24

volumes:
  # Persistent caches for Rust builds inside the test-runner container. These
  # survive `docker compose down` so subsequent builds are incremental.
  netem-cargo-registry:
  netem-cargo-git:
  netem-target:
  # Tmpfs volume for file-based coordination between gateway-runner and
  # viewer-runner in per-link tests.
  coordination:
    driver_opts:
      type: tmpfs
      device: tmpfs

# Note: gateway-runner and viewer-runner intentionally duplicate test-runner's
# configuration rather than using a YAML anchor. Docker Compose's merge key
# (<<: *anchor) replaces entire mappings for `volumes` and `environment`, so
# an anchor would not actually deduplicate the fields that differ (coordination
# volume, COORDINATION_DIR env var, IP address). Explicit definitions are
# clearer about what each service actually gets.

services:
  livekit:
    # Default node-ip is 127.0.0.1 for host-connected clients (live demos).
    # Override with LIVEKIT_NODE_IP=10.99.0.2 for containerized tests.
    command: --dev --bind 0.0.0.0 --node-ip ${LIVEKIT_NODE_IP:-127.0.0.1}
    networks:
      default:
      perlink:
        ipv4_address: 10.99.0.2

  test-runner:
    # Keep in sync with the toolchain version used in CI (setup-rust-toolchain).
    image: rust:1.93.0-bookworm
    working_dir: /workspace
    volumes:
      - .:/workspace
      - netem-cargo-registry:/usr/local/cargo/registry
      - netem-cargo-git:/usr/local/cargo/git
      - netem-target:/workspace/target-docker
    environment:
      CARGO_TARGET_DIR: /workspace/target-docker
      LIVEKIT_URL: "http://10.99.0.2:7880"
      # Colored test output inside Docker.
      CARGO_TERM_COLOR: always
      # The webrtc-sys crate compiles C++ code that requires Clang (uses
      # -Wno-changes-meaning, which GCC does not support).
      CXX: clang++
      CC: clang
    networks:
      perlink:
        ipv4_address: 10.99.0.30
    # Install Clang on first start (needed for webrtc-sys C++ compilation),
    # then keep the container alive for interactive test runs.
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        if ! command -v clang++ > /dev/null 2>&1; then
          apt-get update -qq && apt-get install -y -qq clang > /dev/null 2>&1
        fi
        exec sleep infinity
    healthcheck:
      test: ["CMD-SHELL", "command -v clang++ && test -d /workspace/rust"]
      interval: 5s
      timeout: 10s
      retries: 12
      start_period: 30s
    depends_on:
      livekit:
        condition: service_healthy

  # Gateway runner for per-link tests. Runs the gateway side of the test at
  # 10.99.0.31 (high impairment). See test-runner above for field documentation.
  gateway-runner:
    image: rust:1.93.0-bookworm
    working_dir: /workspace
    volumes:
      - .:/workspace
      - netem-cargo-registry:/usr/local/cargo/registry
      - netem-cargo-git:/usr/local/cargo/git
      - netem-target:/workspace/target-docker
      - coordination:/coordination
    environment:
      CARGO_TARGET_DIR: /workspace/target-docker
      LIVEKIT_URL: "http://10.99.0.2:7880"
      CARGO_TERM_COLOR: always
      CXX: clang++
      CC: clang
      COORDINATION_DIR: /coordination
    networks:
      perlink:
        ipv4_address: 10.99.0.31
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        if ! command -v clang++ > /dev/null 2>&1; then
          apt-get update -qq && apt-get install -y -qq clang > /dev/null 2>&1
        fi
        exec sleep infinity
    healthcheck:
      test: ["CMD-SHELL", "command -v clang++ && test -d /workspace/rust"]
      interval: 5s
      timeout: 10s
      retries: 12
      start_period: 30s
    depends_on:
      livekit:
        condition: service_healthy
    profiles:
      - perlink

  # Viewer runner for per-link tests. Runs the viewer side of the test at
  # 10.99.0.40 (low impairment). See test-runner above for field documentation.
  viewer-runner:
    image: rust:1.93.0-bookworm
    working_dir: /workspace
    volumes:
      - .:/workspace
      - netem-cargo-registry:/usr/local/cargo/registry
      - netem-cargo-git:/usr/local/cargo/git
      - netem-target:/workspace/target-docker
      - coordination:/coordination
    environment:
      CARGO_TARGET_DIR: /workspace/target-docker
      LIVEKIT_URL: "http://10.99.0.2:7880"
      CARGO_TERM_COLOR: always
      CXX: clang++
      CC: clang
      COORDINATION_DIR: /coordination
    networks:
      perlink:
        ipv4_address: 10.99.0.40
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        if ! command -v clang++ > /dev/null 2>&1; then
          apt-get update -qq && apt-get install -y -qq clang > /dev/null 2>&1
        fi
        exec sleep infinity
    healthcheck:
      test: ["CMD-SHELL", "command -v clang++ && test -d /workspace/rust"]
      interval: 5s
      timeout: 10s
      retries: 12
      start_period: 30s
    depends_on:
      livekit:
        condition: service_healthy
    profiles:
      - perlink

  netem:
    environment:
      # Default class: moderate impairment for unclassified traffic.
      NETEM_ARGS: "${NETEM_ARGS:-delay 80ms 20ms loss 2%}"
      # Test runner (single-container mode): high impairment for LiveKit → 10.99.0.30.
      NETEM_LINK_RUNNER_DST: "10.99.0.30"
      NETEM_LINK_RUNNER_ARGS: "${NETEM_LINK_RUNNER_ARGS:-delay 200ms 50ms loss 5%}"
      # Gateway and viewer links default to empty so single-container `digest`
      # doesn't show phantom links. The script exports real values in perlink
      # mode; Compose passes them through via these entries.
      NETEM_LINK_GATEWAY_DST: "${NETEM_LINK_GATEWAY_DST:-}"
      NETEM_LINK_GATEWAY_ARGS: "${NETEM_LINK_GATEWAY_ARGS:-}"
      NETEM_LINK_VIEWER_DST: "${NETEM_LINK_VIEWER_DST:-}"
      NETEM_LINK_VIEWER_ARGS: "${NETEM_LINK_VIEWER_ARGS:-}"
    depends_on:
      livekit:
        condition: service_started
      # test-runner is always started (no profile gate) even in perlink mode.
      # This dependency ensures the netem sidecar waits for it; removing it
      # would require conditional depends_on which Compose does not support.
      test-runner:
        condition: service_started
